# =============================================================================
# hpc-math-core — CI build & test workflow
# =============================================================================
#
# Triggers: every push and pull-request to any branch.
#
# Jobs
# ─────────────────────────────────────────────────────────────────────────────
#  build-linux-x86   Ubuntu 24.04 · GCC 14 · x86-64
#                    Flags: -march=native  (AVX2 + FMA on GitHub runners)
#                    Tests: scalar, AVX2, prefetch; AVX-512/NEON/SVE/CUDA skipped.
#
#  build-linux-arm   Ubuntu 24.04 · GCC 14 · aarch64 (native ARM runner)
#                    Flags: -march=native  (NEON always present on aarch64)
#                    Tests: scalar, NEON, prefetch; AVX*/SVE/CUDA skipped.
#
#  build-macos       macOS 14 (Apple M-series) · Apple Clang · arm64
#                    Flags: -march=native  (NEON always present)
#                    Tests: same as linux-arm; matches local developer machine.
#
#  build-cuda-stub   Ubuntu 24.04 hosted runner — NO CUDA toolkit installed.
#                    CMake finds no nvcc → compiles gemm_kernels_stub.cpp.
#                    bench_gemm_cuda and hpc_tests_cuda are built and run;
#                    every CUDA entry prints SKIPPED (cuda_device_count()=0).
#                    Purpose: proves the stub path compiles and links on CI
#                    without requiring a GPU or the NVIDIA toolkit.
#
# Caching
# ─────────────────────────────────────────────────────────────────────────────
#  ccache reduces repeat compile times from ~3 min → ~20 s on cache hit.
#  Cache key: runner OS + compiler + source hash.
#  FetchContent deps (GoogleTest, Google Benchmark) are cached separately
#  so they are not re-cloned on every run.
#
# Artifacts
# ─────────────────────────────────────────────────────────────────────────────
#  CTest XML results are uploaded as job artifacts so test failures are
#  visible in the GitHub Actions UI without inspecting raw logs.
# =============================================================================

name: CI — Build & Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# Cancel in-progress runs for the same branch on new push.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ---------------------------------------------------------------------------
# Shared environment
# ---------------------------------------------------------------------------
env:
  CMAKE_BUILD_TYPE: Release
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  CCACHE_MAXSIZE: 500M
  CTEST_OUTPUT_ON_FAILURE: "1"

# =============================================================================
# Job 1: Linux x86-64 (GCC 14)
# =============================================================================
jobs:
  build-linux-x86:
    name: "Linux x86-64 · GCC 14"
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install GCC 14 & ccache
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gcc-14 g++-14 ccache ninja-build
          sudo update-alternatives --install /usr/bin/cc  cc  /usr/bin/gcc-14 100
          sudo update-alternatives --install /usr/bin/c++ c++ /usr/bin/g++-14 100

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          # Include runner.arch so ARM and x86 builds never share cached objects.
          key: ccache-linux-x86-gcc14-${{ runner.arch }}-${{ hashFiles('CMakeLists.txt', 'src/**', 'include/**') }}
          restore-keys: ccache-linux-x86-gcc14-${{ runner.arch }}-

      - name: Restore FetchContent cache
        uses: actions/cache@v4
        with:
          path: build/_deps
          # FetchContent sources are arch-independent, but the key still
          # includes runner.arch to avoid any cmake cache file cross-contamination.
          key: fetchcontent-linux-x86-${{ runner.arch }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: fetchcontent-linux-x86-${{ runner.arch }}-

      - name: CMake configure
        run: |
          # -DHPC_MARCH=x86-64-v3: override -march=native with AVX2+FMA which is
          # guaranteed on every GitHub-hosted ubuntu-24.04 x86 runner.
          # Without this, -march=native can emit AVX-512 on Ice Lake / Sapphire
          # Rapids hosts, causing SIGILL when ctest runs on a Cascade Lake host.
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }} \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DHPC_MARCH=x86-64-v3

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests
        working-directory: build
        run: ctest --output-junit ../test-results-linux-x86.xml

      - name: ccache stats
        run: ccache --show-stats

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-linux-x86
          path: test-results-linux-x86.xml

  # =============================================================================
  # Job 2: Linux aarch64 (GCC 14, native ARM runner)
  # =============================================================================
  build-linux-arm:
    name: "Linux aarch64 · GCC 14"
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Install GCC 14 & ccache
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gcc-14 g++-14 ccache ninja-build
          sudo update-alternatives --install /usr/bin/cc  cc  /usr/bin/gcc-14 100
          sudo update-alternatives --install /usr/bin/c++ c++ /usr/bin/g++-14 100

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-linux-arm-gcc14-${{ runner.arch }}-${{ hashFiles('CMakeLists.txt', 'src/**', 'include/**') }}
          restore-keys: ccache-linux-arm-gcc14-${{ runner.arch }}-

      - name: Restore FetchContent cache
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: fetchcontent-linux-arm-${{ runner.arch }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: fetchcontent-linux-arm-${{ runner.arch }}-

      - name: CMake configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }} \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests
        working-directory: build
        run: ctest --output-junit ../test-results-linux-arm.xml

      - name: ccache stats
        run: ccache --show-stats

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-linux-arm
          path: test-results-linux-arm.xml

  # =============================================================================
  # Job 3: macOS 14 (Apple Clang, Apple M runner)
  # =============================================================================
  build-macos:
    name: "macOS 14 · Apple Clang · arm64"
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Install ccache & ninja
        run: brew install ccache ninja

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-macos14-appleclang-${{ runner.arch }}-${{ hashFiles('CMakeLists.txt', 'src/**', 'include/**') }}
          restore-keys: ccache-macos14-appleclang-${{ runner.arch }}-

      - name: Restore FetchContent cache
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: fetchcontent-macos-${{ runner.arch }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: fetchcontent-macos-${{ runner.arch }}-

      - name: CMake configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }} \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests
        working-directory: build
        run: ctest --output-junit ../test-results-macos.xml

      - name: ccache stats
        run: ccache --show-stats

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-macos
          path: test-results-macos.xml

  # =============================================================================
  # Job 4: CUDA stub — hosted runner, no toolkit, stub library only.
  #
  # CMake's check_language(CUDA) finds no nvcc → builds gemm_kernels_stub.cpp.
  # bench_gemm_cuda and hpc_tests_cuda compile against the stub.
  # All CUDA tests/benchmarks print SKIPPED at runtime (cuda_device_count()=0).
  #
  # Purpose: validate that the no-CUDA code path builds and links correctly
  # on every push without needing a GPU runner.
  # =============================================================================
  build-cuda-stub:
    name: "CUDA stub (no toolkit) · Linux x86-64"
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install GCC 14 & ccache
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gcc-14 g++-14 ccache ninja-build
          sudo update-alternatives --install /usr/bin/cc  cc  /usr/bin/gcc-14 100
          sudo update-alternatives --install /usr/bin/c++ c++ /usr/bin/g++-14 100

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-cuda-stub-gcc14-${{ runner.arch }}-${{ hashFiles('CMakeLists.txt', 'src/**', 'include/**') }}
          restore-keys: ccache-cuda-stub-gcc14-${{ runner.arch }}-

      - name: Restore FetchContent cache
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: fetchcontent-cuda-stub-${{ runner.arch }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: fetchcontent-cuda-stub-${{ runner.arch }}-

      # No CUDA toolkit installed — CMake will detect no nvcc and use the stub.
      - name: CMake configure (stub path)
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }} \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DHPC_MARCH=x86-64-v3

      - name: Build (stub + all CPU targets)
        run: cmake --build build --parallel

      - name: Run tests (CUDA tests print SKIPPED — expected)
        working-directory: build
        run: ctest --output-junit ../test-results-cuda-stub.xml

      - name: Smoke-test bench_gemm_cuda (all rows must say SKIPPED)
        run: |
          ./build/benchmarks/cuda/bench_gemm_cuda \
            --benchmark_filter="N=64" \
            --benchmark_min_time=0.01s 2>&1 \
          | tee /tmp/cuda_bench_out.txt
          # Fail if any row ran instead of being skipped.
          if grep -qP "^\s+\d" /tmp/cuda_bench_out.txt; then
            echo "ERROR: a CUDA benchmark ran on a no-GPU runner"
            exit 1
          fi
          echo "OK — all CUDA benchmarks correctly skipped"

      - name: ccache stats
        run: ccache --show-stats

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-cuda-stub
          path: test-results-cuda-stub.xml


